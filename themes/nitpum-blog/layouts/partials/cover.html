{{ if not (eq .Params.NoCover true) }}		
	{{ with .Resources }}
		{{ with .GetMatch "cover.{webp,jpg,jpeg,png}" }}
			{{ $cover := . }}
			{{ with $cover }}
				<figure>
					<img src="{{ .Permalink }}" alt="{{ .Title }}" width="900" height="372" />
				</figure>
			{{ end }}
		{{ end }}
	{{ end }}
{{ end}}
